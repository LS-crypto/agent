# Sheldon Agent — Nginx 站点（80 端口：静态前端 + 反代 API/SSE）
# 安装：见 deploy/setup-nginx.sh

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/sheldon-agent/web;
    index index.html;

    # 工作区 zip 上传默认上限 50MB（WORKSPACE_UPLOAD_MAX_ZIP_BYTES）
    client_max_body_size 55m;

    # 后端健康检查
    location = /health {
        proxy_pass http://127.0.0.1:8081/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API + SSE 流式（勿开启 buffering）
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # PWA：Service Worker / manifest 勿长期缓存
    location ~* ^/(sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA：其余路径回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
